name: Supabase Backup

on:
  schedule:
    # Runs daily at 2:00 AM UTC
    - cron: '0 2 * * *'
  workflow_dispatch: # allow manual trigger from GitHub UI

jobs:
  backup:
    runs-on: ubuntu-latest
    steps:
      - name: Install pg_dump 17
        run: |
          sudo sh -c 'echo "deb https://apt.postgresql.org/pub/repos/apt $(lsb_release -cs)-pgdg main" > /etc/apt/sources.list.d/pgdg.list'
          curl -fsSL https://www.postgresql.org/media/keys/ACCC4CF8.asc | sudo gpg --dearmor -o /etc/apt/trusted.gpg.d/pgdg.gpg
          sudo apt-get update -qq
          sudo apt-get install -y postgresql-client-17
          /usr/lib/postgresql/17/bin/pg_dump --version

      - name: Run pg_dump
        env:
          DB_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: |
          if [ -z "$DB_URL" ]; then echo "ERROR: DB_URL secret is empty"; exit 1; fi
          echo "Connecting to: $(echo $DB_URL | sed 's/:\/\/[^:]*:[^@]*@/:\/\/***:***@/')"
          TIMESTAMP=$(date +%Y-%m-%dT%H-%M-%S)
          /usr/lib/postgresql/17/bin/pg_dump "$DB_URL" \
            --no-owner \
            --no-acl \
            --format=plain \
            --file="backup-${TIMESTAMP}.sql"
          echo "BACKUP_FILE=backup-${TIMESTAMP}.sql" >> $GITHUB_ENV

      - name: Upload backup artifact
        uses: actions/upload-artifact@v4
        with:
          name: supabase-backup-${{ github.run_id }}
          path: ${{ env.BACKUP_FILE }}
          retention-days: 90
